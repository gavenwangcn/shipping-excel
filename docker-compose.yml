services:
  ship-excel-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ship-excel-backend
    restart: unless-stopped
    ports:
      - "8099:8099"
    volumes:
      - shipping-data:/app/data
    environment:
      - DATA_DIR=/app/data
      - PORT=8099
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8099/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ship-excel-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ship-excel-frontend
    restart: unless-stopped
    ports:
      - "30088:80"
    depends_on:
      ship-excel-backend:
        condition: service_healthy

volumes:
  shipping-data:
