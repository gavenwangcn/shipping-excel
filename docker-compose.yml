services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shipping-excel-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - shipping-data:/app/data
    environment:
      - DATA_DIR=/app/data
      - PORT=8080
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shipping-excel-frontend
    restart: unless-stopped
    ports:
      - "30088:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  shipping-data:
